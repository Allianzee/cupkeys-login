<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cupkeys Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <!-- LOGO -->
        <div class="logo">
            <h1>CUPKEYS</h1>
            <p>Serve. Cook. Win.</p>
        </div>

        <!-- EMAIL/PASSWORD FORM -->
        <div id="emailTab" class="tab-content active">
            <form id="loginForm" class="login-form">
                <h2>Login</h2>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="your@email.com" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="••••••••" 
                        required
                    >
                </div>

                <div id="errorMsg" class="error-msg"></div>

                <button type="submit" class="btn-login">
                    <span id="btnText">Login</span>
                    <span id="btnLoader" class="loader" style="display:none;"></span>
                </button>
            </form>

            <div class="toggle-auth">
                <p id="toggleText">Don't have an account? <a href="#" id="toggleLink">Register</a></p>
            </div>
        </div>

        <!-- DIVIDER -->
        <div class="divider">
            <span>or</span>
        </div>

        <!-- SOCIAL LOGIN BUTTONS -->
        <div class="social-login">
            <button type="button" class="btn-social btn-google" id="googleBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Google
            </button>

            <button type="button" class="btn-social btn-discord" id="discordBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                    <path d="M20.317 4.492c-1.53-.742-3.247-1.288-5.07-1.543a.058.058 0 00-.064.028c-.219.39-.461.9-.63 1.3a18.566 18.566 0 00-5.487 0c-.168-.4-.41-.91-.63-1.3a.057.057 0 00-.064-.028c-1.823.255-3.54.801-5.07 1.543a.058.058 0 00-.027.064c-3.234 4.814-4.122 9.51-3.684 14.137a.06.06 0 00.025.059c2.178 1.589 4.29 2.543 6.369 3.174a.059.059 0 00.064-.021c.48-.654.909-1.345 1.275-2.067a.058.058 0 00-.032-.081c-.674-.255-1.313-.56-1.92-.908a.059.059 0 00-.03-.106c.128-.095.257-.196.38-.3a.058.058 0 00.064-.008c4.028 1.846 8.388 1.846 12.36 0a.058.058 0 00.065.007c.124.104.252.205.38.3a.059.059 0 00-.029.106c-.608.348-1.247.653-1.921.908a.058.058 0 00-.032.081c.366.722.795 1.413 1.275 2.067a.059.059 0 00.064.021c2.078-.631 4.19-1.585 6.368-3.174a.059.059 0 00.024-.059c.487-4.772-.82-8.927-3.476-12.637a.057.057 0 00-.028-.064zm-8.317 19.897c-1.26 0-2.303-.922-2.303-2.055 0-1.133 1.023-2.055 2.303-2.055 1.288 0 2.323.922 2.303 2.055 0 1.133-1.015 2.055-2.303 2.055zm6.364 0c-1.26 0-2.303-.922-2.303-2.055 0-1.133 1.023-2.055 2.303-2.055 1.288 0 2.323.922 2.303 2.055 0 1.133-1.015 2.055-2.303 2.055z"/>
                </svg>
                Discord
            </button>
        </div>

        <div id="statusMsg" class="status-msg"></div>
    </div>
